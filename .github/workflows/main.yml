name: Activation-Bataillon-Omni
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Lancement du Tunnel
        run: dotnet run
